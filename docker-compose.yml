services:
  postgres:
    image: postgres:16-alpine
    container_name: ezstream-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ezstream
      POSTGRES_PASSWORD: ezstream
      POSTGRES_DB: ezstream
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezstream -d ezstream"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ezstream-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
